name: Build & Test

on:
  push:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: dotnet build

      - name: Test
        run: dotnet test --no-build --verbosity normal
        continue-on-error: true
